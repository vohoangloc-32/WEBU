<div
  style="
    min-height: 600px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #060d1f;
    border-radius: 12px;
    padding: 40px 20px;
  "
>
  <div style="width: 100%; max-width: 460px">
    <h2
      id="form-title"
      style="
        text-align: center;
        font-size: 32px;
        font-weight: 700;
        color: #e8e8f0;
        margin: 0 0 32px;
        font-family: Georgia, serif;
        letter-spacing: 0.5px;
      "
    >
      Sign Up
    </h2>

    <div id="signup-form">
      <div style="margin-bottom: 16px">
        <input
          type="email"
          placeholder="Email"
          style="
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            background: #111827;
            border: 1.5px solid #2563eb;
            border-radius: 6px;
            color: #c8ccd8;
            font-size: 14px;
            outline: none;
          "
          onfocus="this.style.borderColor = '#3b82f6'"
          onblur="this.style.borderColor = '#2563eb'"
        />
      </div>
      <div style="margin-bottom: 16px">
        <input
          type="text"
          placeholder="Username"
          style="
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            background: #111827;
            border: 1.5px solid #1e3a6e;
            border-radius: 6px;
            color: #c8ccd8;
            font-size: 14px;
            outline: none;
          "
          onfocus="this.style.borderColor = '#3b82f6'"
          onblur="this.style.borderColor = '#1e3a6e'"
        />
      </div>
      <div style="margin-bottom: 16px">
        <input
          type="password"
          placeholder="Password"
          style="
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            background: #111827;
            border: 1.5px solid #1e3a6e;
            border-radius: 6px;
            color: #c8ccd8;
            font-size: 14px;
            outline: none;
          "
          onfocus="this.style.borderColor = '#3b82f6'"
          onblur="this.style.borderColor = '#1e3a6e'"
        />
      </div>
      <div style="margin-bottom: 24px">
        <input
          type="password"
          placeholder="Confirm Password"
          style="
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            background: #111827;
            border: 1.5px solid #1e3a6e;
            border-radius: 6px;
            color: #c8ccd8;
            font-size: 14px;
            outline: none;
          "
          onfocus="this.style.borderColor = '#3b82f6'"
          onblur="this.style.borderColor = '#1e3a6e'"
        />
      </div>
    </div>

    <div id="signin-form" style="display: none">
      <div style="margin-bottom: 16px">
        <input
          type="email"
          placeholder="Email"
          style="
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            background: #111827;
            border: 1.5px solid #1e3a6e;
            border-radius: 6px;
            color: #c8ccd8;
            font-size: 14px;
            outline: none;
          "
          onfocus="this.style.borderColor = '#3b82f6'"
          onblur="this.style.borderColor = '#1e3a6e'"
        />
      </div>
      <div style="margin-bottom: 24px">
        <input
          type="password"
          placeholder="Password"
          style="
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            background: #111827;
            border: 1.5px solid #1e3a6e;
            border-radius: 6px;
            color: #c8ccd8;
            font-size: 14px;
            outline: none;
          "
          onfocus="this.style.borderColor = '#3b82f6'"
          onblur="this.style.borderColor = '#1e3a6e'"
        />
      </div>
    </div>

    <div
      style="
        display: flex;
        align-items: center;
        gap: 0;
        justify-content: center;
      "
    >
      <button
        id="btn-signup"
        onclick="switchTo('signup')"
        style="
          background: #3b82f6;
          color: #fff;
          border: none;
          border-radius: 6px;
          padding: 10px 22px;
          font-size: 15px;
          font-weight: 600;
          cursor: pointer;
          letter-spacing: 0.3px;
          transition: background 0.2s;
        "
      >
        Sign Up
      </button>
      <button
        id="btn-signin"
        onclick="switchTo('signin')"
        style="
          background: transparent;
          color: #94a3b8;
          border: none;
          padding: 10px 22px;
          font-size: 15px;
          font-weight: 500;
          cursor: pointer;
          letter-spacing: 0.3px;
          transition: color 0.2s;
        "
      >
        Sign In
      </button>
    </div>
  </div>
</div>

<script>
  function switchTo(page) {
    const signupForm = document.getElementById('signup-form');
    const signinForm = document.getElementById('signin-form');
    const title = document.getElementById('form-title');
    const btnSignup = document.getElementById('btn-signup');
    const btnSignin = document.getElementById('btn-signin');

    if (page === 'signup') {
      signupForm.style.display = 'block';
      signinForm.style.display = 'none';
      title.textContent = 'Sign Up';
      btnSignup.style.background = '#3b82f6';
      btnSignup.style.color = '#fff';
      btnSignup.style.borderRadius = '6px';
      btnSignup.style.border = 'none';
      btnSignin.style.background = 'transparent';
      btnSignin.style.color = '#94a3b8';
      btnSignin.style.border = 'none';
    } else {
      signupForm.style.display = 'none';
      signinForm.style.display = 'block';
      title.textContent = 'Sign In';
      btnSignin.style.background = '#3b82f6';
      btnSignin.style.color = '#fff';
      btnSignin.style.borderRadius = '6px';
      btnSignin.style.border = 'none';
      btnSignup.style.background = 'transparent';
      btnSignup.style.color = '#94a3b8';
      btnSignup.style.border = 'none';
    }
  }
</script>
